*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:24px}
h1{font-size:22px;font-weight:700;margin-bottom:2px}
.sub{color:#64748b;font-size:13px;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px}
.stat-lbl{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:700}
.areas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}

.section-hd h2{font-size:15px;font-weight:700;color:#0f172a}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px;border-left:4px solid #cbd5e1;cursor:pointer;transition:box-shadow .15s,transform .1s;max-width:480px}

.c-mid{display:flex;align-items:baseline;gap:6px;margin:8px 0 4px;flex-wrap:wrap}
.c-val{font-size:40px;font-weight:800}
.c-obj{font-size:11px;color:#94a3b8}
.c-next{font-size:11px;color:#94a3b8;margin-bottom:6px}
.spark{display:block;width:100%;height:156px;overflow:visible}
.spark-wrap{display:flex;gap:4px;margin-top:6px}
.spark-axis{position:relative;display:flex;flex-direction:column;justify-content:space-between;font-size:9px;color:#94a3b8;height:156px;line-height:1;min-width:16px;text-align:right;padding-bottom:13px}
.spark-axis-obj{position:absolute;left:0;transform:translateY(-50%);font-size:9px;font-weight:700;color:#475569;white-space:nowrap}
.spark-body{flex:1;min-width:0}
.spark-chart{position:relative}
.spark-val{font-size:7px;font-weight:600;text-anchor:middle;font-family:-apple-system,sans-serif}
.spark-val-sm{font-size:7px;font-weight:700}
.empty{text-align:center;padding:40px;font-size:13px;color:#94a3b8}
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);align-items:center;justify-content:center;z-index:50;padding:20px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.modal-close{cursor:pointer;font-size:20px;color:#94a3b8;border:none;background:none;line-height:1;padding:4px}
.modal-close:hover{color:#475569}
.modal h2{font-size:18px;font-weight:700;margin-bottom:2px}
.modal .mcode{font-family:'SF Mono',Consolas,monospace;font-size:12px;color:#64748b;font-weight:700}
.modal .marea{font-size:12px;color:#94a3b8;margin-top:6px;margin-bottom:8px}
.legend{display:flex;gap:16px;font-size:12px;color:#475569;margin:10px 0;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend .sw{width:10px;height:10px;border-radius:2px;display:inline-block}
.bigchart{width:100%;height:260px;position:relative;margin:8px 0 16px}
.meta-box{background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12.5px}
.meta-row{display:flex;gap:8px;padding:4px 0}
.meta-row b{color:#64748b;min-width:120px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.meta-row span{color:#0f172a;flex:1}
.hist-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
.hist-table th{text-align:left;padding:6px 8px;background:#f8fafc;font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase}
.hist-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.hist-table tr:last-child td{border-bottom:none}
.hist-wrap{max-height:240px;overflow-y:auto;border:1px solid #f1f5f9;border-radius:8px}
</style>

  const objTxt = lastEj[2] !== null ? ('Obj ' + fmt1(lastEj[2])) : 'Sin objetivo';
  const nextTxt = (nextEj && nextEj[2] !== null) ? ('Ejercicio ' + nextEj[0] + ' &middot; objetivo propuesto ' + fmt1(nextEj[2])) : '';
  const avg = histAvg(ejSeries);
  const avgTxt = avg !== null ? ('Promedio hist&oacute;rico ' + fmt1(avg)) : '';
  const i = ITEMS.indexOf(d);
  return '<div class="card" style="border-left-color:' + sLine + '" onclick="openModal(' + i + ')">' +
    '<div class="c-top"><div><div class="c-code">' + code + '</div><div class="c-name">' + name + '</div></div>' +
    '<span class="pill" style="background:' + sBg + ';color:' + sFg + '">' + sLbl + '</span></div>' +
    '<div class="c-mid"><span class="c-val" style="color:' + sLine + '">' + valTxt + '</span><span class="c-obj">Ejercicio ' + lastEj[0] + ' &middot; ' + objTxt + '</span></div>' +
    (avgTxt ? '<div class="c-next">' + avgTxt + (nextTxt ? ' &middot; ' + nextTxt : '') + '</div>' : (nextTxt ? '<div class="c-next">' + nextTxt + '</div>' : '')) +
    spark(ejSeries, sLine) + '</div>';
}

function updateStats() {
  let cumplen = 0, noCumplen = 0, sinDato = 0;
  ITEMS.forEach(d => {
    const { compliant } = closedEjStatus(d[8]);
    if (compliant === 1) cumplen++;
    else if (compliant === 0) noCumplen++;
    else sinDato++;
  });
  document.getElementById('st-total').textContent = ITEMS.length;
  document.getElementById('st-cumplen').textContent = cumplen;
  document.getElementById('st-nocumplen').textContent = noCumplen;
  document.getElementById('st-sindato').textContent = sinDato;
}

function render() {
  const wrap = document.getElementById('sections');
  const list = ITEMS.filter(d => !activeArea || d[2] === activeArea);
  if (!list.length) { wrap.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  const byArea = {};
  list.forEach(d => { (byArea[d[2]] = byArea[d[2]] || []).push(d); });
  Object.keys(byArea).forEach(a => {
    byArea[a].sort((x, y) => {
      const [lx, nx] = naturalCode(x[0]), [ly, ny] = naturalCode(y[0]);
      return lx === ly ? nx - ny : lx.localeCompare(ly);
    });
  });
  const areaOrder = DATA.areas.filter(a => byArea[a]);
  wrap.innerHTML = areaOrder.map(a => {
    const items = byArea[a];
    return '<div class="section"><div class="section-hd"><h2>' + a + '</h2><span class="cnt">' + items.length + ' indicador' + (items.length===1?'':'es') + '</span></div>' +
      '<div class="grid">' + items.map(cardHtml).join('') + '</div></div>';
  }).join('');
}

function openModal(i) {
  const d = ITEMS[i];
  const code=d[0], name=d[1], area=d[2], val=d[3], lastDate=d[4], obj=d[5], st=d[6], pts=d[7], ejPts=d[8],
        objDesc=d[9], metodo=d[10], frecuencia=d[11], resp=d[12], acciones=d[13];
  const stArr = ST[st]; const sLbl = stArr[0], sFg = stArr[1], sBg = stArr[2], sLine = stArr[3];

  const rows = pts.slice().reverse().map(p => {
    const [iso, punt, pobj] = p;
    const cumpleRow = (punt !== null && pobj !== null) ? (punt >= pobj) : null;
    const badge = cumpleRow === null ? '' : (cumpleRow ? '<span style="color:#16a34a;font-weight:700">&#10003;</span>' : '<span style="color:#dc2626;font-weight:700">&#10007;</span>');
    return '<tr><td>' + fdate(iso) + '</td><td>' + (pobj !== null ? fmt1(pobj) : '—') + '</td><td style="font-weight:600">' + (punt !== null ? fmt(punt) : '—') + '</td><td>' + badge + '</td></tr>';
  }).join('');

  let metaHtml = '';
  if (objDesc) {
    metaHtml = '<div class="meta-box">' +
      '<div class="meta-row"><b>Objetivo</b><span>' + objDesc + '</span></div>' +
      (metodo ? '<div class="meta-row"><b>M&eacute;todo</b><span>' + metodo + '</span></div>' : '') +
      (frecuencia ? '<div class="meta-row"><b>Frecuencia</b><span>' + frecuencia + '</span></div>' : '') +
      (resp ? '<div class="meta-row"><b>Responsables</b><span>' + resp + '</span></div>' : '') +
      (acciones ? '<div class="meta-row"><b>Acciones</b><span>' + acciones + '</span></div>' : '') +
      '</div>';
  }

  const modal = document.getElementById('modal');
  modal.innerHTML = '<div class="modal-top"><div><div class="mcode">' + code + '</div><h2>' + name + '</h2><div class="marea">' + area + '</div></div>' +
    '<button class="modal-close" onclick="closeModal()" aria-label="Cerrar">&times;</button></div>' +
    '<div class="c-mid" style="margin-top:4px"><span class="c-val" style="font-size:32px">' + fmt(val) + '</span>' +
    '<span class="c-obj">' + (obj !== null ? ('Objetivo actual ' + fmt1(obj)) : 'Sin objetivo definido') + ' &middot; &uacute;ltima medici&oacute;n ' + fdateLast(lastDate) + '</span>' +
    '<span class="pill" style="background:' + sBg + ';color:' + sFg + ';margin-left:auto">' + sLbl + '</span></div>' +
    metaHtml +
    '<div class="legend"><span><span class="sw" style="background:' + GREEN + '"></span>Cumple objetivo</span><span><span class="sw" style="background:' + RED + '"></span>No cumple</span><span><span class="sw" style="background:#475569"></span>Objetivo</span><span><span class="sw" style="background:#6366f1"></span>Tendencia</span></div>' +
    '<div class="bigchart"><canvas id="bigcanvas" role="img" aria-label="Evolucion historica de ' + name + '"></canvas></div>' +
    '<div class="hist-wrap"><table class="hist-table"><thead><tr><th>Fecha</th><th>Objetivo</th><th>Puntaje</th><th>Cumple</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  document.getElementById('ov').classList.add('open');

  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const ctx = document.getElementById('bigcanvas');
  const labels = pts.map(p => fdate(p[0]));
  const puntajes = pts.map(p => p[1]);
  const objs = pts.map(p => p[2]);
  const pointColors = pts.map(p => (p[1] !== null && p[2] !== null) ? (p[1] >= p[2] ? GREEN : RED) : GRAY);
  const trend = trendLine(puntajes);

  chartInst = new Chart(ctx, {
    data: {
      labels: labels,
      datasets: [
        {
          type: 'bar',
          label: 'Puntaje',
          data: puntajes,
          backgroundColor: pointColors,
          borderRadius: 2,
          maxBarThickness: 22,
          order: 2
        },
        { type: 'line', label: 'Objetivo', data: objs, borderColor: '#475569', backgroundColor: 'transparent', fill: false, spanGaps: true, borderDash: [5,4], tension: 0, pointRadius: 0, borderWidth: 1.6, order: 0 },
        { type: 'line', label: 'Tendencia', data: trend, borderColor: '#6366f1', backgroundColor: 'transparent', fill: false, spanGaps: true, tension: 0.35, cubicInterpolationMode: 'monotone', pointRadius: 0, borderWidth: 2.5, order: 1 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: (item) => item.dataset.label + ': ' + (item.raw !== null ? item.raw.toFixed(2).replace('.',',') : 'sin dato') } } },
      scales: {
        y: { min: 0, max: 10, ticks: { stepSize: 2 }, grid: { color: '#f1f5f9' } },
        x: { ticks: { autoSkip: true, maxRotation: 45 }, grid: { display: false } }
      }
    }
  });
}

function trendLine(values) {
  const n = values.length;
  const window = Math.max(3, Math.round(n / 6));
  const half = Math.floor(window / 2);
  return values.map((_, i) => {
    const lo = Math.max(0, i - half), hi = Math.min(n - 1, i + half);
    const slice = values.slice(lo, hi + 1).filter(v => v !== null);
    if (!slice.length) return null;
    return slice.reduce((s, v) => s + v, 0) / slice.length;
  });
}

function closeModal() {
  document.getElementById('ov').classList.remove('open');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

updateStats();
render();
</script>
</body>
</html>
