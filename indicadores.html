<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:24px}
h1{font-size:22px;font-weight:700;margin-bottom:2px}
.sub{color:#64748b;font-size:13px;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px}
.stat-lbl{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:700}
.areas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.abtn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#475569}
.abtn:hover{border-color:#cbd5e1}
.abtn.act{border-color:#6366f1;background:#eef2ff;color:#4338ca}
.section{margin-bottom:28px}
.section-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-hd h2{font-size:15px;font-weight:700;color:#0f172a}
.section-hd .cnt{font-size:12px;color:#94a3b8;background:#f1f5f9;padding:2px 9px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;border-left:4px solid #cbd5e1;cursor:pointer;transition:box-shadow .15s,transform .1s}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.07);transform:translateY(-1px)}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px}
.c-code{font-family:'SF Mono',Consolas,monospace;font-size:11px;font-weight:700;color:#64748b}
.c-name{font-size:13px;color:#0f172a;margin-top:2px;line-height:1.3;font-weight:500}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap}
.c-mid{display:flex;align-items:baseline;gap:6px;margin:8px 0 4px;flex-wrap:wrap}
.c-val{font-size:34px;font-weight:800}
.c-obj{font-size:11px;color:#94a3b8}
.c-next{font-size:11px;color:#94a3b8;margin-bottom:6px}
.spark{display:block;width:100%;height:110px}
.spark-ej{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-top:2px;padding:0 2px}
.spark-wrap{display:flex;gap:4px;margin-top:6px}
.spark-axis{position:relative;display:flex;flex-direction:column;justify-content:space-between;font-size:9px;color:#94a3b8;height:110px;line-height:1;min-width:28px}
.spark-axis-obj{position:absolute;left:0;transform:translateY(-50%);font-size:9px;font-weight:700;color:#475569;white-space:nowrap}
.spark-body{flex:1;min-width:0}
.spark-chart{position:relative}
.empty{text-align:center;padding:40px;font-size:13px;color:#94a3b8}
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);align-items:center;justify-content:center;z-index:50;padding:20px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.modal-close{cursor:pointer;font-size:20px;color:#94a3b8;border:none;background:none;line-height:1;padding:4px}
.modal-close:hover{color:#475569}
.modal h2{font-size:18px;font-weight:700;margin-bottom:2px}
.modal .mcode{font-family:'SF Mono',Consolas,monospace;font-size:12px;color:#64748b;font-weight:700}
.modal .marea{font-size:12px;color:#94a3b8;margin-top:6px;margin-bottom:8px}
.legend{display:flex;gap:16px;font-size:12px;color:#475569;margin:10px 0;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend .sw{width:10px;height:10px;border-radius:2px;display:inline-block}
.bigchart{width:100%;height:260px;position:relative;margin:8px 0 16px}
.meta-box{background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12.5px}
.meta-row{display:flex;gap:8px;padding:4px 0}
.meta-row b{color:#64748b;min-width:120px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.meta-row span{color:#0f172a;flex:1}
.hist-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
.hist-table th{text-align:left;padding:6px 8px;background:#f8fafc;font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase}
.hist-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.hist-table tr:last-child td{border-bottom:none}
.hist-wrap{max-height:240px;overflow-y:auto;border:1px solid #f1f5f9;border-radius:8px}
</style>
</head>
