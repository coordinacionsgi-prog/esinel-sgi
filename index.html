<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI ESINEL - Dashboards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 48px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            color: #0f172a;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 40px;
        }
        .links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-decoration: none;
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }
        a:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateX(4px);
        }
        .icon {
            font-size: 24px;
        }
        .arrow {
            color: #94a3b8;
            transition: color 0.2s;
        }
        a:hover .arrow {
            color: white;
        }
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 SGI ESINEL</h1>
        <div class="subtitle">Sistema de Gestión Integrada - Dashboards</div>
        
        <div class="links">
            <a href="indicadores.html" title="Ver dashboard de indicadores">
                <span><span class="icon">📈</span> Indicadores</span>
                <span class="arrow">→</span>
            </a>
            <a href="documentos.html" title="Ver listado de documentos del SGI">
                <span><span class="icon">📋</span> Listado de Documentos</span>
                <span class="arrow">→</span>
            </a>
            <a href="vehiculos.html" title="Ver gestión de vehículos">
                <span><span class="icon">🚗</span> Gestión de Vehículos</span>
                <span class="arrow">→</span>
            </a>
        </div>
        
        <footer>
            ESINEL S.R.L. | Sistema de Gestión Integrada ISO 9001 / 14001 / 45001
        </footer>
    </div>
</body>
</html>
